services:
  # ==========================================================
  # go2rtc — RTSP passthrough to WebRTC (no transcoding)
  # All 29 cameras available via WebRTC at http://localhost:1984
  # ==========================================================
  go2rtc:
    image: alexxit/go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./configs/go2rtc.yaml:/config/go2rtc.yaml:ro

  # ==========================================================
  # Backend — Python API + DeepStream C++ subprocess (GPU)
  # Python launches C++ as subprocess, reads detections via SHM.
  # API: http://localhost:8000
  # WebSocket: ws://localhost:8000/ws
  # ==========================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: race-vision:latest
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    volumes:
      - ./configs/cameras_example.json:/app/cameras_example.json:ro
      - ./models:/app/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    depends_on:
      - go2rtc
    command: ["--config", "cameras_example.json", "--deepstream",
              "--host", "0.0.0.0", "--port", "8000"]

  # ==========================================================
  # Frontend — React app served by Nginx
  # UI: http://localhost:3000
  # Proxies /ws, /api, /stream → backend:8000
  # ==========================================================
  frontend:
    build:
      context: ./Kabirhan-Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: __AUTO__
        VITE_GO2RTC_URL: /go2rtc
    image: race-vision-frontend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:80"
